[tool:pytest]
# AI REVENUE COMMAND CENTER - PYTEST CONFIGURATION

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Output formatting
addopts = 
    -v 
    --tb=short 
    --strict-markers
    --disable-warnings
    --color=yes

# Markers
markers =
    smoke: Smoke tests for critical functionality
    integration: Integration tests
    slow: Tests that take more than 5 seconds
    
# Minimum version
minversion = 7.0

# Test timeout
timeout = 300

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S