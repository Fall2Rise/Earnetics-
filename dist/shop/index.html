
<!doctype html><html lang="en"><head><meta charset="utf-8">
<title>AI Revenue Command Center — Shop</title><meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Explore products from AI Revenue Command Center.">
<link rel="stylesheet" href="../assets/shop.css"><link rel="canonical" href="https://www.airevenuecommandcenter.com/shop/">{}</head>
<body><div class="header"><div class="logo" data-brand="headline">AI REVENUE COMMAND CENTER</div><div class="nav"><a href="/">Home</a><a href="/shop/">Shop</a></div></div>
<div class="wrap"><div class="hero"><div class="badge">New drops · Secure checkout</div><h1>Shop</h1>
<p class="muted">Created by AI Revenue Command Center. Every item includes instant access.</p></div><div class="grid">    <a class="card" href="/shop/the-609-machine.html">
      <img src="https://placehold.co/1200x800/png" alt="The 609 Machine">
      <div class="pad">
        <div class="badge">Credit</div>
        <div class="title">The 609 Machine</div>
        <div class="price">$47.00</div>
      </div>
    </a></div></div>
<footer>© {2025} <span data-brand="footer">AI Revenue Command Center</span></footer><script>
        (async () => {
            try {
                const response = await fetch('/api/branding');
                if (!response.ok) return;
                const branding = await response.json();
                const name = branding.name || 'AI Revenue Command Center';
                document.title = `${name} — Shop`;
                document.querySelectorAll('[data-brand="headline"]').forEach((el) => {
                    el.textContent = name;
                });
                document.querySelectorAll('[data-brand="footer"]').forEach((el) => {
                    el.textContent = name;
                });
                const meta = document.querySelector('meta[name="description"]');
                if (meta) {
                    const tagline = branding.tagline ? ` ${branding.tagline}` : '';
                    meta.setAttribute('content', `Explore products from ${name}.${tagline}`);
                }
            } catch (error) {
                console.error('Unable to load branding configuration', error);
            }
        })();
    </script>
</body></html>
