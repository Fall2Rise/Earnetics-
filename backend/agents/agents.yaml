  verbose: true

head_engineering:
  role: "Head of Engineering"
  goal: "Break the roadmap into build tasks."
  backstory: "Keeps code modular and production-ready."
  allow_delegation: true
  verbose: true

python_backend:
  role: "Backend Engineer"
