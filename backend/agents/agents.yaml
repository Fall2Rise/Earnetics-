  allow_delegation: false
  verbose: true

devops_deployer:
  role: "DevOps Engineer"
  goal: "Handle deployment flows for revenue modules."
  allow_delegation: false
  verbose: true

head_qa:
  role: "Head of QA"
  goal: "Decide if a revenue play is safe and shippable."
  allow_delegation: true
  verbose: true

unit_tester:
  role: "Unit Tester"
  goal: "Validate core automations and schedulers."
  allow_delegation: false
  verbose: true

head_sales:
